name: Build Installers V2

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  push:
    branches:
      - dev
      - main
      - audit-safe-fixes
    tags:
      - 'v*'
  pull_request:
    branches:
      - dev
      - main

permissions:
  contents: write

jobs:
  debian:
    name: Debian Package
    runs-on: ubuntu-24.04
    container:
      image: debian:13

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install build dependencies
        shell: bash
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            cmake ninja-build build-essential pkg-config dpkg-dev \
            qt6-base-dev qt6-base-dev-tools qt6-tools-dev qt6-tools-dev-tools linguist-qt6 \
            libqt6sql6-sqlite libqt6sql6-mysql libmariadb-dev-compat

      - name: Configure and build
        shell: bash
        run: |
          cmake -S . -B build-debian -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build-debian -j 4

      - name: Package deb
        shell: bash
        run: bash ci/package-debian.sh build-debian dist/debian

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: Inwentaryzacja-debian-package
          path: dist/debian/*.deb

  windows:
    name: Windows Installer
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Qt with aqtinstall
        shell: pwsh
        run: |
          python -m pip install --upgrade pip aqtinstall
          python -m aqt install-qt windows desktop 6.8.2 win64_msvc2022_64 --outputdir "$env:RUNNER_TEMP\Qt"
          "QT_ROOT=$env:RUNNER_TEMP\Qt\6.8.2\msvc2022_64" >> $env:GITHUB_ENV
          "$env:RUNNER_TEMP\Qt\6.8.2\msvc2022_64\bin" >> $env:GITHUB_PATH

      - name: Install zlib with vcpkg
        shell: pwsh
        run: |
          $vcpkgRoot = $env:VCPKG_INSTALLATION_ROOT
          if ([string]::IsNullOrWhiteSpace($vcpkgRoot)) {
            $vcpkgRoot = 'C:\vcpkg'
          }
          if (-not (Test-Path (Join-Path $vcpkgRoot 'vcpkg.exe'))) {
            throw "Nie znaleziono vcpkg.exe w: $vcpkgRoot"
          }
          & (Join-Path $vcpkgRoot 'vcpkg.exe') install zlib:x64-windows
          "APP_VCPKG_ROOT=$vcpkgRoot" >> $env:GITHUB_ENV
          "VCPKG_ROOT=$vcpkgRoot" >> $env:GITHUB_ENV

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Configure and build
        shell: cmd
        run: |
          for /f "usebackq delims=" %%i in (`"%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath`) do set VSINSTALL=%%i
          call "%VSINSTALL%\Common7\Tools\VsDevCmd.bat" -arch=x64 -host_arch=x64
          set VCPKG_ROOT=%APP_VCPKG_ROOT%
          for /f "usebackq delims=" %%i in (`qmake -query QT_INSTALL_PREFIX`) do set QT_PATH=%%i
          cmake -S . -B build-windows -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="%QT_PATH%" -DCMAKE_TOOLCHAIN_FILE="%VCPKG_ROOT%\scripts\buildsystems\vcpkg.cmake" -DVCPKG_TARGET_TRIPLET=x64-windows
          cmake --build build-windows --config Release -j 4

      - name: Package installer
        shell: pwsh
        run: .\ci\package-windows.ps1 -BuildDir build-windows -OutputDir dist\windows

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: Inwentaryzacja-windows-installer
          path: |
            dist/windows/*.exe
            dist/windows/*.zip

  macos-intel:
    name: macOS Intel Installer
    runs-on: macos-15-intel

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Qt with aqtinstall
        shell: bash
        run: |
          python -m pip install --upgrade pip aqtinstall
          python -m aqt install-qt mac desktop 6.8.2 clang_64 --outputdir "$RUNNER_TEMP/Qt"
          echo "$RUNNER_TEMP/Qt/6.8.2/macos/bin" >> "$GITHUB_PATH"

      - name: Configure and build
        shell: bash
        run: |
          QT_PATH="$(qmake -query QT_INSTALL_PREFIX)"
          cmake -S . -B build-macos-intel -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$QT_PATH"
          cmake --build build-macos-intel -j 4

      - name: Package installer
        shell: bash
        run: bash ci/package-macos.sh build-macos-intel dist/macos-intel intel

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: Inwentaryzacja-macos-intel-installer
          path: |
            dist/macos-intel/*.dmg
            dist/macos-intel/*.zip

  macos-arm:
    name: macOS ARM Installer
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Qt with aqtinstall
        shell: bash
        run: |
          python -m pip install --upgrade pip aqtinstall
          python -m aqt install-qt mac desktop 6.8.2 clang_64 --outputdir "$RUNNER_TEMP/Qt"
          echo "$RUNNER_TEMP/Qt/6.8.2/macos/bin" >> "$GITHUB_PATH"

      - name: Configure and build
        shell: bash
        run: |
          QT_PATH="$(qmake -query QT_INSTALL_PREFIX)"
          cmake -S . -B build-macos-arm -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$QT_PATH"
          cmake --build build-macos-arm -j 4

      - name: Package installer
        shell: bash
        run: bash ci/package-macos.sh build-macos-arm dist/macos-arm arm64

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: Inwentaryzacja-macos-arm-installer
          path: |
            dist/macos-arm/*.dmg
            dist/macos-arm/*.zip

  release:
    name: Publish release assets
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - debian
      - windows
      - macos-intel
      - macos-arm
    runs-on: ubuntu-latest

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v8
        with:
          name: Inwentaryzacja-windows-installer
          path: release-assets/windows

      - name: Download Debian artifact
        uses: actions/download-artifact@v8
        with:
          name: Inwentaryzacja-debian-package
          path: release-assets/debian

      - name: Download macOS Intel artifact
        uses: actions/download-artifact@v8
        with:
          name: Inwentaryzacja-macos-intel-installer
          path: release-assets/macos-intel

      - name: Download macOS ARM artifact
        uses: actions/download-artifact@v8
        with:
          name: Inwentaryzacja-macos-arm-installer
          path: release-assets/macos-arm

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: Inwentaryzacja ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release-assets/debian/*
            release-assets/windows/*
            release-assets/macos-intel/*
            release-assets/macos-arm/*
