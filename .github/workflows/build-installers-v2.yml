name: Build Installers V2

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  push:
    branches:
      - dev
      - main
      - audit-safe-fixes
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  windows:
    name: Windows Installer
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'

      - name: Enable MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Configure and build
        shell: pwsh
        run: |
          $qtPath = & qmake -query QT_INSTALL_PREFIX
          cmake -S . -B build-windows -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$qtPath"
          cmake --build build-windows --config Release -j 4

      - name: Package installer
        shell: pwsh
        run: .\ci\package-windows.ps1 -BuildDir build-windows -OutputDir dist\windows

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Inwentaryzacja-windows-installer
          path: |
            dist/windows/*.exe
            dist/windows/*.zip

  macos-intel:
    name: macOS Intel Installer
    runs-on: macos-13

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Qt with aqtinstall
        shell: bash
        run: |
          python -m pip install --upgrade pip aqtinstall
          python -m aqt install-qt mac desktop 6.8.2 clang_64 --outputdir "$RUNNER_TEMP/Qt"
          echo "$RUNNER_TEMP/Qt/6.8.2/macos/bin" >> "$GITHUB_PATH"

      - name: Configure and build
        shell: bash
        run: |
          QT_PATH="$(qmake -query QT_INSTALL_PREFIX)"
          cmake -S . -B build-macos-intel -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$QT_PATH"
          cmake --build build-macos-intel -j 4

      - name: Package installer
        shell: bash
        run: bash ci/package-macos.sh build-macos-intel dist/macos-intel intel

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Inwentaryzacja-macos-intel-installer
          path: |
            dist/macos-intel/*.dmg
            dist/macos-intel/*.zip

  macos-arm:
    name: macOS ARM Installer
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Qt with aqtinstall
        shell: bash
        run: |
          python -m pip install --upgrade pip aqtinstall
          python -m aqt install-qt mac desktop 6.8.2 clang_64 --outputdir "$RUNNER_TEMP/Qt"
          echo "$RUNNER_TEMP/Qt/6.8.2/macos/bin" >> "$GITHUB_PATH"

      - name: Configure and build
        shell: bash
        run: |
          QT_PATH="$(qmake -query QT_INSTALL_PREFIX)"
          cmake -S . -B build-macos-arm -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$QT_PATH"
          cmake --build build-macos-arm -j 4

      - name: Package installer
        shell: bash
        run: bash ci/package-macos.sh build-macos-arm dist/macos-arm arm64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Inwentaryzacja-macos-arm-installer
          path: |
            dist/macos-arm/*.dmg
            dist/macos-arm/*.zip

  release:
    name: Publish release assets
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - windows
      - macos-intel
      - macos-arm
    runs-on: ubuntu-latest

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: Inwentaryzacja-windows-installer
          path: release-assets/windows

      - name: Download macOS Intel artifact
        uses: actions/download-artifact@v4
        with:
          name: Inwentaryzacja-macos-intel-installer
          path: release-assets/macos-intel

      - name: Download macOS ARM artifact
        uses: actions/download-artifact@v4
        with:
          name: Inwentaryzacja-macos-arm-installer
          path: release-assets/macos-arm

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/windows/*
            release-assets/macos-intel/*
            release-assets/macos-arm/*
